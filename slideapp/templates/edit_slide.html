<!DOCTYPE html>
<html>
<head>
    <title>{{ slide.title }}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background: #f5f3ef;
        }

        #editor-wrapper {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #d8d0c4;
        }

        #preview {
            width: 50%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #toolbar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .return-button {
            background-color: gray;
            border: none;
            color: #ffffff;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 0;
        }

        .return-button:hover {
            background-color: #666;
        }

        /* CodeMirror editor styles */
        .cm-editor {
            height: 100% !important;
            background: #faf9f7;
        }
        .cm-editor.cm-focused {
            outline: none;
        }
        .cm-scroller {
            overflow: auto !important;
            font-family: 'Inconsolata', 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace !important;
            font-size: 13.5px !important;
            line-height: 1.65 !important;
        }
        .cm-content {
            padding: 16px 12px !important;
            caret-color: #374151;
        }
        .cm-gutters {
            background: #f5f3ef !important;
            border-right: 1px solid #e0dbd3 !important;
            color: #bbb3a6 !important;
            font-size: 12px;
        }
        .cm-activeLineGutter {
            background: #ede9e2 !important;
            color: #7a6e5e !important;
        }
        .cm-activeLine {
            background: rgba(0, 0, 0, 0.025) !important;
        }
        .cm-selectionBackground,
        .cm-editor.cm-focused .cm-selectionBackground {
            background: #d4e4f7 !important;
        }
        .cm-cursor, .cm-dropCursor {
            border-left-color: #374151 !important;
            border-left-width: 2px !important;
        }
        .cm-foldGutter {
            display: none !important;
        }

        /* Slide highlight blink */
        .cm-slide-highlight {
            background: rgba(255, 210, 80, 0.22) !important;
        }
    </style>
</head>
<body>
<div id="toolbar">
    <button class="return-button" onclick="location.href='{% url 'index' %}'">返回主页</button>
</div>

<div id="editor-wrapper"></div>
<div id="preview">
    <iframe id="preview-iframe"></iframe>
</div>

{% load static %}
<script src="{% static 'js/jquery-3.7.1.min.js' %}"></script>
<script type="module">
    // --- CodeMirror 6 imports (local bundle) ---
    import {
        EditorView, basicSetup,
        EditorState, StateEffect, StateField,
        Decoration, keymap,
        markdown,
        syntaxHighlighting, HighlightStyle,
        tags
    } from "{% static 'js/codemirror-bundle.min.js' %}"

    // --- Markdown syntax highlight colors (source-code mode) ---
    const mdHighlight = HighlightStyle.define([
        {tag: tags.heading1, color: "#1a56db", fontWeight: "700"},
        {tag: tags.heading2, color: "#1e40af", fontWeight: "700"},
        {tag: tags.heading3, color: "#2563eb", fontWeight: "600"},
        {tag: tags.heading4, color: "#3b82f6", fontWeight: "600"},
        {tag: tags.heading5, color: "#60a5fa", fontWeight: "600"},
        {tag: tags.heading6, color: "#93c5fd", fontWeight: "600"},
        {tag: tags.processingInstruction, color: "#b0a898"},
        {tag: tags.emphasis, fontStyle: "italic", color: "#7c3aed"},
        {tag: tags.strong, fontWeight: "bold"},
        {tag: tags.monospace, color: "#c05529", background: "rgba(192,85,41,0.08)", borderRadius: "3px"},
        {tag: tags.link, color: "#2563eb", textDecoration: "underline"},
        {tag: tags.url, color: "#8b95a5"},
        {tag: tags.quote, color: "#6b7280", fontStyle: "italic"},
        {tag: tags.contentSeparator, color: "#c05529", fontWeight: "bold"},
        {tag: tags.list, color: "#c05529", fontWeight: "600"},
        {tag: tags.meta, color: "#8b95a5"},
        {tag: tags.comment, color: "#a0a0a0", fontStyle: "italic"},
    ]);

    // --- Slide highlight decoration ---
    const setSlideHighlight = StateEffect.define();
    const slideHighlightField = StateField.define({
        create() { return Decoration.none },
        update(decos, tr) {
            for (let e of tr.effects) {
                if (e.is(setSlideHighlight)) {
                    if (!e.value) return Decoration.none;
                    let {from, to} = e.value;
                    let doc = tr.state.doc;
                    let decorations = [];
                    let pos = Math.min(from, doc.length);
                    let end = Math.min(to, doc.length);
                    if (pos > end) return Decoration.none;
                    while (pos <= end && pos <= doc.length) {
                        let line = doc.lineAt(pos);
                        decorations.push(
                            Decoration.line({class: "cm-slide-highlight"}).range(line.from)
                        );
                        if (line.to >= doc.length) break;
                        pos = line.to + 1;
                    }
                    return Decoration.set(decorations);
                }
            }
            return decos;
        },
        provide: f => EditorView.decorations.from(f)
    });

    // --- Application state ---
    var slideId = {{ slide.id }};
    var protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    var socket = new WebSocket(protocol + window.location.host + '/ws/slide/' + slideId + '/');
    var currentIndices = {h: 0, v: 0};
    var serverVersion = null;
    var slides = [];
    var lastSlideIndices = {h: -1, v: -1};
    var suppressUpdate = false;

    // --- Create CodeMirror editor ---
    const cm = new EditorView({
        state: EditorState.create({
            doc: "",
            extensions: [
                keymap.of([{
                    key: "Mod-s",
                    run() { saveSlide(); return true; }
                }]),
                basicSetup,
                markdown(),
                syntaxHighlighting(mdHighlight),
                EditorView.lineWrapping,
                slideHighlightField,
                EditorView.updateListener.of(update => {
                    if (update.docChanged && !suppressUpdate) {
                        slides = parseSlides(cm.state.doc.toString());
                        sendPreview();
                    }
                }),
                EditorView.updateListener.of(update => {
                    if (update.selectionSet) {
                        onCursorPositionChange();
                    }
                }),
                EditorView.domEventHandlers({
                    paste(event, view) {
                        var items = event.clipboardData && event.clipboardData.items;
                        if (!items) return;
                        for (var i = 0; i < items.length; i++) {
                            if (items[i].type.indexOf('image') !== -1) {
                                uploadImage(items[i].getAsFile());
                                event.preventDefault();
                                return true;
                            }
                        }
                    },
                    drop(event, view) {
                        var files = event.dataTransfer && event.dataTransfer.files;
                        if (!files) return;
                        for (var i = 0; i < files.length; i++) {
                            if (files[i].type.indexOf('image') !== -1) {
                                uploadImage(files[i]);
                                event.preventDefault();
                                return true;
                            }
                        }
                    }
                })
            ]
        }),
        parent: document.getElementById('editor-wrapper')
    });

    // --- Editor helpers ---
    function getContent() {
        return cm.state.doc.toString();
    }

    function setContent(text) {
        suppressUpdate = true;
        cm.dispatch({
            changes: {from: 0, to: cm.state.doc.length, insert: text}
        });
        suppressUpdate = false;
    }

    function getCursorPos() {
        return cm.state.selection.main.head;
    }

    function setCursorPos(pos) {
        cm.dispatch({selection: {anchor: Math.min(pos, cm.state.doc.length)}});
    }

    // --- WebSocket ---
    socket.onopen = function (e) {
        console.log('WebSocket 连接已打开');
        socket.send(JSON.stringify({'action': 'load'}));
    };

    socket.onmessage = function (e) {
        var data = JSON.parse(e.data);
        var action = data['action'];

        if (action === 'load') {
            var cursorPos = getCursorPos();
            var scrollTop = cm.scrollDOM.scrollTop;
            setContent(data['content']);
            serverVersion = data['version'];
            slides = parseSlides(getContent());
            setCursorPos(cursorPos);
            requestAnimationFrame(function () { cm.scrollDOM.scrollTop = scrollTop; });
            sendPreview();
            onCursorPositionChange();

        } else if (action === 'reload') {
            var iframe = document.getElementById('preview-iframe');
            if (iframe.contentWindow && iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.getIndices) {
                currentIndices = iframe.contentWindow.Reveal.getIndices();
            }
            var cursorPos = getCursorPos();
            var scrollTop = cm.scrollDOM.scrollTop;
            setContent(data['content']);
            serverVersion = data['version'];
            slides = parseSlides(getContent());
            setCursorPos(cursorPos);
            requestAnimationFrame(function () { cm.scrollDOM.scrollTop = scrollTop; });
            sendPreview();
            console.log('Content reloaded from server (reason: ' + data['reason'] + ')');

        } else if (action === 'save_ok') {
            serverVersion = data['version'];
            var html_content = data['html'];
            var iframe = document.getElementById('preview-iframe');
            if (iframe.contentWindow && iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.getIndices) {
                currentIndices = iframe.contentWindow.Reveal.getIndices();
            }
            iframe.contentDocument.open();
            iframe.contentDocument.write(html_content);
            iframe.contentDocument.close();
            clearErrorMessage();
            iframe.onload = function () {
                function restoreSlide() {
                    if (iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.isReady()) {
                        iframe.contentWindow.Reveal.slide(currentIndices.h, currentIndices.v);
                        iframe.contentWindow.Reveal.on('slidechanged', onRevealSlideChanged);
                        navigateToSlide(lastSlideIndices.h, lastSlideIndices.v);
                    } else {
                        setTimeout(restoreSlide, 50);
                    }
                }
                restoreSlide();
            };
            console.log('Save successful, version: ' + serverVersion);

        } else if (action === 'version_info') {
            if (serverVersion !== null && data['version'] !== serverVersion) {
                socket.send(JSON.stringify({'action': 'load'}));
            }

        } else if (action === 'preview') {
            var html_content = data['html'];
            var iframe = document.getElementById('preview-iframe');
            if (iframe.contentWindow && iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.getIndices) {
                currentIndices = iframe.contentWindow.Reveal.getIndices();
            }
            iframe.contentDocument.open();
            iframe.contentDocument.write(html_content);
            iframe.contentDocument.close();
            clearErrorMessage();
            iframe.onload = function () {
                function restoreSlide() {
                    if (iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.isReady()) {
                        iframe.contentWindow.Reveal.slide(currentIndices.h, currentIndices.v);
                        iframe.contentWindow.Reveal.on('slidechanged', onRevealSlideChanged);
                        navigateToSlide(lastSlideIndices.h, lastSlideIndices.v);
                    } else {
                        setTimeout(restoreSlide, 50);
                    }
                }
                restoreSlide();
            };

        } else if (action === 'error') {
            displayErrorMessage(data['message']);
        }
    };

    socket.onclose = function (e) {
        console.log('WebSocket 连接已关闭');
    };

    function sendPreview() {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                'action': 'preview',
                'markdown': getContent()
            }));
        }
    }

    // --- Error display ---
    function displayErrorMessage(message) {
        if (!document.getElementById('error-message')) {
            var errorDiv = document.createElement('div');
            errorDiv.id = 'error-message';
            errorDiv.style.cssText = 'position:fixed;bottom:20px;left:20px;background:rgba(255,0,0,0.8);color:#fff;padding:10px;border-radius:5px;max-width:300px;z-index:1000;font-size:14px;line-height:1.5';
            document.body.appendChild(errorDiv);
        }
        document.getElementById('error-message').textContent = '语法错误：' + message;
    }

    function clearErrorMessage() {
        var el = document.getElementById('error-message');
        if (el) el.remove();
    }

    // --- Save ---
    function saveSlide() {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                'action': 'save',
                'markdown': getContent(),
                'version': serverVersion
            }));
            console.log('Saving slide...');
        }
    }

    setInterval(saveSlide, 60000);
    window.addEventListener('beforeunload', saveSlide);

    // --- Image upload ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            let cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                let cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    var csrftoken = getCookie('csrftoken');

    function uploadImage(file) {
        var formData = new FormData();
        formData.append('image', file);
        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload_image/', true);
        xhr.onload = function () {
            if (xhr.status === 200) {
                var response = JSON.parse(xhr.responseText);
                if (response.url) {
                    insertImageMarkdown(response.url);
                } else {
                    alert('上传失败');
                }
            } else {
                alert('上传失败');
            }
        };
        xhr.setRequestHeader('X-CSRFToken', csrftoken);
        xhr.send(formData);
    }

    function insertImageMarkdown(url) {
        var markdownImage = '![](' + url + ')';
        var sel = cm.state.selection.main;
        cm.dispatch({
            changes: {from: sel.from, to: sel.to, insert: markdownImage},
            selection: {anchor: sel.from + markdownImage.length}
        });
    }

    // --- Slide parsing ---
    function parseSlides(markdownText) {
        var lines = markdownText.split('\n');
        var result = [];
        var position = 0;
        var currentSlideStart = 0;
        var hIndex = 0;
        var vIndex = 0;
        var inCode = false;
        var fenceChar = '';

        for (var i = 0; i <= lines.length; i++) {
            var line = lines[i] || '';
            var trimmed = line.trim();
            // Track fenced code blocks (``` or ~~~)
            var fenceMatch = trimmed.match(/^(`{3,}|~{3,})/);
            if (fenceMatch) {
                var ch = fenceMatch[1][0];
                if (!inCode) {
                    inCode = true;
                    fenceChar = ch;
                } else if (ch === fenceChar) {
                    inCode = false;
                    fenceChar = '';
                }
            }
            if (!inCode) {
                if (trimmed === '---') {
                    result.push({start: currentSlideStart, end: position, h: hIndex, v: vIndex});
                    hIndex++;
                    vIndex = 0;
                    currentSlideStart = position + line.length + 1;
                } else if (trimmed === '----' || trimmed === '++++') {
                    result.push({start: currentSlideStart, end: position, h: hIndex, v: vIndex});
                    vIndex++;
                    currentSlideStart = position + line.length + 1;
                }
            }
            position += line.length + 1;
        }

        result.push({start: currentSlideStart, end: position, h: hIndex, v: vIndex});
        return result;
    }

    // --- Editor ↔ Preview sync ---
    function scrollEditorToSlide(h, v) {
        for (var i = 0; i < slides.length; i++) {
            if (slides[i].h === h && slides[i].v === v) {
                var slide = slides[i];
                lastSlideIndices = {h: h, v: v};

                var from = Math.min(slide.start, cm.state.doc.length);
                cm.dispatch({
                    effects: EditorView.scrollIntoView(from, {y: "start", yMargin: 10}),
                    selection: {anchor: from}
                });

                var blinkCount = 0;
                function doBlink() {
                    if (blinkCount >= 4) {
                        cm.dispatch({effects: setSlideHighlight.of(null)});
                        return;
                    }
                    if (blinkCount % 2 === 0) {
                        cm.dispatch({effects: setSlideHighlight.of({
                            from: slide.start,
                            to: Math.min(slide.end, cm.state.doc.length)
                        })});
                    } else {
                        cm.dispatch({effects: setSlideHighlight.of(null)});
                    }
                    blinkCount++;
                    setTimeout(doBlink, 180);
                }
                doBlink();
                break;
            }
        }
    }

    function onRevealSlideChanged() {
        var iframe = document.getElementById('preview-iframe');
        if (!iframe.contentWindow || !iframe.contentWindow.Reveal) return;
        currentIndices = iframe.contentWindow.Reveal.getIndices();
        if (currentIndices.h !== lastSlideIndices.h || currentIndices.v !== lastSlideIndices.v) {
            scrollEditorToSlide(currentIndices.h, currentIndices.v);
        }
    }

    function navigateToSlide(h, v) {
        var iframe = document.getElementById('preview-iframe');
        function doNavigate() {
            if (iframe.contentWindow && iframe.contentWindow.Reveal && iframe.contentWindow.Reveal.isReady()) {
                iframe.contentWindow.Reveal.slide(h, v);
            } else {
                setTimeout(doNavigate, 50);
            }
        }
        doNavigate();
    }

    function onCursorPositionChange() {
        var cursorPos = getCursorPos();
        for (var i = 0; i < slides.length; i++) {
            var slide = slides[i];
            if (cursorPos >= slide.start && cursorPos <= slide.end) {
                if (slide.h !== lastSlideIndices.h || slide.v !== lastSlideIndices.v) {
                    lastSlideIndices = {h: slide.h, v: slide.v};
                    navigateToSlide(slide.h, slide.v);
                }
                break;
            }
        }
    }

    // --- Init ---
    slides = parseSlides(getContent());
    onCursorPositionChange();

    setInterval(function () {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({'action': 'check_version'}));
        }
    }, 3000);
</script>
</body>
</html>
